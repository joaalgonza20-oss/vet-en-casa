<head>

  <title>Veterinaria a domicilio en Concepción para perros y gatos | JVet en Casa</title>
  <meta name="description" content="JVet en Casa ofrece veterinaria a domicilio para perros y gatos en Concepción, San Pedro, Chiguayante, Talcahuano, Penco y Hualpén. Agenda por WhatsApp." />
  <style>
    :root {
      --primary: #1F4E5F;
      --primary-dark: #173B47;
      --accent: #6FAE9D;
      --accent-soft: #DCECE6;
      --bg: #F8F5EF;
      --surface: #FFFFFF;
      --surface-soft: #EEF4F1;
      --text: #1E2933;
      --muted: #5F6B73;
      --border: rgba(31, 78, 95, 0.10);
      --shadow: 0 18px 40px rgba(23, 59, 71, 0.10);
      --radius: 24px;
      --max-width: 1180px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    .container { width: min(92%, var(--max-width)); margin: 0 auto; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(248, 245, 239, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: grid;
      place-items: center;
      color: white;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .brand-copy strong {
      display: block;
      font-size: 1.08rem;
      color: var(--text);
    }
    .brand-copy span {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 600;
    }
    .menu {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .menu a {
      color: var(--text);
      font-weight: 600;
      transition: 0.2s ease;
    }
    .menu a:hover { color: var(--primary); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 22px;
      min-height: 52px;
      border-radius: 999px;
      font-weight: 700;
      transition: 0.25s ease;
      border: none;
      cursor: pointer;
      text-align: center;
      gap: 8px;
      text-wrap: balance;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1FAF5A 0%, #25D366 100%);
      color: white;
      box-shadow: 0 18px 36px rgba(37, 211, 102, 0.28);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #16964A 0%, #1FB85A 100%); transform: translateY(-2px); }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.96);
      color: var(--primary);
      border: 1px solid rgba(31, 78, 95, 0.16);
      box-shadow: 0 10px 24px rgba(31, 78, 95, 0.08);
    }
    .btn-secondary:hover { background: #fdfdfd; transform: translateY(-2px); }
    .btn:focus-visible {
      outline: 3px solid rgba(31, 78, 95, 0.22);
      outline-offset: 3px;
    }
    .menu .btn,
    .hero-actions .btn-primary,
    .service-card .btn,
    .trust-panel .btn,
    .cta-box .btn {
      font-size: 0.98rem;
      font-weight: 800;
    }
    .hero-actions .btn-primary,
    .cta-box .btn,
    .menu .btn {
      position: relative;
    }
    .hero-actions .btn-primary::before,
    .service-card .btn::before,
    .trust-panel .btn::before,
    .cta-box .btn::before,
    .menu .btn::before {
      content: "WhatsApp";
      display: inline-block;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.82;
    }
    .menu .btn::before,
    .hero-actions .btn-primary::before,
    .service-card .btn::before,
    .trust-panel .btn::before {
      color: rgba(255, 255, 255, 0.88);
    }
    .cta-box .btn::before {
      color: rgba(31, 78, 95, 0.72);
    }
    .service-card .btn,
    .trust-panel .btn,
    .cta-box .btn,
    .menu .btn,
    .hero-actions .btn-primary {
      letter-spacing: 0.01em;
    }
    .cta-box .btn-secondary {
      background: white;
      border: 2px solid rgba(255, 255, 255, 0.52);
      box-shadow: 0 18px 34px rgba(9, 26, 32, 0.20);
    }
    .cta-box .btn-secondary:hover {
      background: #f8fffb;
    }

    .hero { padding: 78px 0 56px; }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 34px;
      align-items: center;
    }
    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--primary);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .hero h1 {
      font-size: clamp(2.3rem, 5vw, 4.2rem);
      line-height: 1.06;
      margin-bottom: 18px;
      color: var(--text);
    }
    .hero p {
      max-width: 630px;
      color: var(--muted);
      font-size: 1.06rem;
      margin-bottom: 26px;
    }
    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .hero-points span {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .hero-card {
      background: var(--surface);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .hero-visual {
      padding: 24px;
      background: linear-gradient(135deg, #F6F1E8 0%, #EEF4F1 100%);
    }
    .hero-logo-image {
      background: white;
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .hero-logo-image img { width: 100%; height: auto; border-radius: 16px; }
    .hero-info-grid { display: grid; gap: 12px; }
    .hero-info-box {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 18px;
      padding: 16px;
    }
    .hero-info-box strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }
    .hero-info-box span { color: var(--muted); font-size: 0.96rem; }

    section { padding: 34px 0; }
    .section-title {
      text-align: center;
      margin-bottom: 30px;
    }
    .section-title h2 {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      color: var(--text);
      margin-bottom: 8px;
    }
    .section-title p {
      max-width: 760px;
      margin: 0 auto;
      color: var(--muted);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }
    .service-card {
      background: var(--surface);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);

      flex-direction: column;
    }
    .service-media {
      height: 220px;
      overflow: hidden;
      background: #eadfd4;
    }
    .service-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .service-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .service-card h3 {
      font-size: 1.18rem;
      line-height: 1.15;
      margin-bottom: 14px;
      color: var(--text);
    }
    .service-card p {
      color: var(--muted);
      margin-bottom: 18px;
      flex-grow: 1;
    }
    .service-intro {
      margin-bottom: 16px;
      flex-grow: 0;
    }
    .service-features {
      list-style: none;
      display: grid;
      gap: 10px;
      margin: 0 0 20px;
      padding: 0;
      color: var(--text);
      font-size: 0.96rem;
    }
    .service-features li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid rgba(31, 78, 95, 0.08);
      line-height: 1.45;
    }
    .service-features .icon {
      flex: 0 0 1.2rem;
      display: inline-flex;
      justify-content: center;
      line-height: 1;
      margin-top: 2px;
    }
    .service-features .text {
      color: var(--text);
      font-weight: 600;
    }
    .service-features .price-item {
      background: #f6f1e8;
      border-color: rgba(111, 174, 157, 0.24);
    }
    .service-card .btn {
      align-self: flex-start;
      margin-top: auto;
    }

    .procedures-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      align-items: stretch;
    }
    .procedures-main,
    .procedures-side {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 28px;
    }
    .procedures-main h3,
    .procedures-side h3 {
      font-size: 1.35rem;
      margin-bottom: 14px;
      color: var(--text);
    }
    .procedures-main p,
    .procedures-side p {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .tag-list span {
      background: var(--surface-soft);
      color: var(--primary);
      border: 1px solid rgba(111,174,157,0.28);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.94rem;
    }
    .mini-cards { display: grid; gap: 14px; }
    .mini-card {
      background: linear-gradient(135deg, #F6F1E8 0%, #EEF4F1 100%);
      border-radius: 20px;
      padding: 16px 18px;
    }
    .mini-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }
    .mini-card span { color: var(--muted); font-size: 0.96rem; }

    .trust-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      align-items: center;
    }
    .trust-panel {
      background: var(--surface);
      border-radius: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 28px;
    }
    .trust-panel h3 {
      font-size: 1.5rem;
      margin-bottom: 14px;
      color: var(--text);
    }
    .trust-panel p {
      color: var(--muted);
      margin-bottom: 20px;
    }
    .trust-photo {
      margin-top: 18px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
    }
    .trust-list { display: grid; gap: 14px; }
    .trust-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: var(--surface-soft);
      border-radius: 18px;
      padding: 16px;
    }
    .trust-item .icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: white;
      border: 1px solid rgba(31,78,95,0.08);
      display: grid;
      place-items: center;
      color: var(--primary);
      flex-shrink: 0;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .trust-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }
    .trust-item span { color: var(--muted); font-size: 0.96rem; }

    .credentials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .credential-card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .credential-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #F6F1E8 0%, #EEF4F1 100%);
      color: var(--primary);
      font-size: 1.35rem;
      font-weight: 700;
    }
    .credential-card h3 {
      font-size: 1.32rem;
      line-height: 1.2;
      color: var(--text);
    }
    .credential-card p {
      color: var(--muted);
      margin: 0;
      flex-grow: 1;
    }
    .credential-card .btn {
      align-self: flex-start;
      min-width: 170px;
    }

    .coverage-contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .info-box,
    .cta-box {
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 28px;
    }
    .info-box { background: var(--surface); }
    .cta-box {
      background: linear-gradient(135deg, var(--primary), #295E71);
      color: white;
      border: none;
    }
    .info-box h3,
    .cta-box h3 {
      font-size: 1.35rem;
      margin-bottom: 16px;
    }
    .info-list {
      list-style: none;
      display: grid;
      gap: 12px;
    }
    .info-list li { color: var(--text); }
    .info-note {
      margin-top: 16px;
      background: var(--surface-soft);
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--muted);
      font-weight: 700;
    }
    .cta-box p {
      margin-bottom: 18px;
      color: rgba(255,255,255,0.92);
    }
    .cta-box .btn-secondary {
      color: var(--primary);
      border-color: transparent;
    }

    footer {
      margin-top: 38px;
      padding: 28px 0 34px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
    }
    .whatsapp-float {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #25D366;
      color: white;
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      box-shadow: 0 16px 32px rgba(37, 211, 102, 0.35);
      z-index: 999;
      transition: 0.25s ease;
      animation: whatsapp-pulse 2.2s infinite;
    }
    .whatsapp-float:hover { transform: translateY(-3px) scale(1.03); }
    .whatsapp-float::after {
      content: "WhatsApp";
      position: absolute;
      right: 76px;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      color: var(--primary);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(23, 59, 71, 0.14);
      border: 1px solid rgba(31, 78, 95, 0.08);
      white-space: nowrap;
    }
    @keyframes whatsapp-pulse {
      0%, 100% { box-shadow: 0 16px 32px rgba(37, 211, 102, 0.35); }
      50% { box-shadow: 0 18px 38px rgba(37, 211, 102, 0.52); }
    }

      .procedures-grid,
      .trust-grid,

    @media (max-width: 640px) {

      .hero-actions .btn,

        gap: 10px;
      }
      .hero-points span,
      .tag-list span {
        width: 100%;

      }
      .service-body,
      .credential-card,
      .procedures-main,
      .procedures-side,
      .trust-panel,

      .cta-box {

        gap: 8px;
        font-size: 0.94rem;
      }

        padding: 9px 11px;
      }
      .service-media {
        height: 220px;
      }
      .trust-item .icon {

    @media (max-width: 420px) {

<body>
  <header class="topbar">
    <div class="container nav">
      <a href="#inicio" class="brand">
        <div class="brand-icon">🐾</div>
        <div class="brand-copy">
          <strong>JVet en Casa</strong>
          <span>Méd. Vet. Joaquín González</span>
        </div>
