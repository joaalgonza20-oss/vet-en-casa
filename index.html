<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVet en Casa | Méd. Vet. Joaquín González</title>
  <meta
    name="description"
    content="JVet en Casa. Veterinaria a domicilio para perros y gatos en Concepción, San Pedro, Chiguayante, Talcahuano, Penco, Hualpén y otras comunas según disponibilidad."
  />
  <style>
    :root {
      --primary: #1F4E5F;
      --primary-dark: #173B47;
      --accent: #6FAE9D;
      --accent-soft: #DCECE6;
      --bg: #F8F5EF;
      --surface: #FFFFFF;
      --surface-soft: #EEF4F1;
      --text: #1E2933;
      --muted: #5F6B73;
      --border: rgba(31, 78, 95, 0.10);
      --shadow: 0 18px 40px rgba(23, 59, 71, 0.10);
      --radius: 24px;
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(92%, var(--max-width));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(248, 245, 239, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text strong {
      display: block;
      font-size: 1.08rem;
      color: var(--text);
    }

    .brand-text span {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      font-weight: 600;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    .menu a {
      color: var(--text);
      font-weight: 600;
      transition: 0.2s ease;
    }

    .menu a:hover {
      color: var(--primary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 22px;
      border-radius: 999px;
      font-weight: 700;
      transition: 0.25s ease;
      border: none;
      cursor: pointer;
      text-align: center;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #fdfdfd;
      transform: translateY(-2px);
    }

    .hero {
      padding: 78px 0 56px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 34px;
      align-items: center;
    }

    .badge {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--primary);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: clamp(2.3rem, 5vw, 4.2rem);
      line-height: 1.06;
      margin-bottom: 18px;
      color: var(--text);
    }

    .hero p {
      max-width: 630px;
      color: var(--muted);
      font-size: 1.06rem;
      margin-bottom: 26px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hero-points span {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .hero-card {
      background: var(--surface);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .hero-visual {
      padding: 26px;
      background: linear-gradient(135deg, #F6F1E8 0%, #EEF4F1 100%);
    }

    .hero-logo-image {
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero-logo-image img {
      width: 100%;
      height: auto;
      border-radius: 16px;
    }

    .hero-info-grid {
      display: grid;
      gap: 12px;
    }

    .hero-info-box {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 18px;
      padding: 16px;
    }

    .hero-info-box strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }

    .hero-info-box span {
      color: var(--muted);
      font-size: 0.96rem;
    }

    section {
      padding: 34px 0;
    }

    .section-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .section-title h2 {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      color: var(--text);
      margin-bottom: 8px;
    }

    .section-title p {
      max-width: 760px;
      margin: 0 auto;
      color: var(--muted);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .service-card {
      background: var(--surface);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .service-media {
      height: 220px;
      overflow: hidden;
      background: #e8ddd3;
    }

    .service-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .service-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .service-card h3
